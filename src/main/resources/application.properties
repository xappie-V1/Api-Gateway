spring.application.name=innovatech
server.port=8081

spring.cloud.gateway.server.webmvc.routes[0].id=usuario
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/usuarios/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=RewritePath=/api/usuarios/(?<segment>.*), /${segment}

